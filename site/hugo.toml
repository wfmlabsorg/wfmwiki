baseURL = "https://wiki.wfmlabs.com"
languageCode = "en-us"
title = "WFM Labs Knowledge Wiki"

[params]
  author = "Ted Lango"
  description = "WFM Labs Knowledge Wiki — next-generation workforce planning across the supply-and-demand industry. Contact centers as the foundational discipline."
  siteVersion = "1.0.0"
  logoText = "WFM Labs Wiki"
  logoIcon = "book-atlas"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.wikilinks]
        enabled = false
  [markup.highlight]
    style = "monokai"
    noClasses = false
    lineNos = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[outputs]
  home    = ["HTML", "SearchIndex"]
  page    = ["HTML"]
  section = ["HTML"]

[outputFormats]
  [outputFormats.SearchIndex]
    mediaType       = "application/json"
    baseName        = "search-index"
    isPlainText     = true
    notAlternative  = true

enableRobotsTXT = true
enableGitInfo   = true
summaryLength   = 70

ignoreLogs = ['warning-frontmatter-params-overrides']

[frontmatter]
  date     = ["date", "created", ":default"]
  lastmod  = [":git", "updated", "lastmod", "date"]

[taxonomies]
  tag      = "tags"
  domain   = "domains"
  aperture = "apertures"
  status   = "statuses"

