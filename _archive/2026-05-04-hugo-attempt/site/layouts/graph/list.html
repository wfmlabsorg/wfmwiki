{{ define "main" }}
<div class="graph-page">
  <header class="graph-header">
    <h1 class="graph-title">
      <i class="fa-solid fa-share-nodes"></i>
      Knowledge Graph
    </h1>
    <p class="graph-subtitle">
      {{ len .Site.RegularPages }} pages &bull; click a node to navigate &bull; scroll to zoom
    </p>
    <div class="graph-legend">
      <span class="legend-item legend-projects"><i class="fa-solid fa-circle"></i> Projects</span>
      <span class="legend-item legend-decisions"><i class="fa-solid fa-circle"></i> Decisions</span>
      <span class="legend-item legend-learnings"><i class="fa-solid fa-circle"></i> Learnings</span>
      <span class="legend-item legend-research"><i class="fa-solid fa-circle"></i> Research</span>
      <span class="legend-item legend-reference"><i class="fa-solid fa-circle"></i> Reference</span>
    </div>
  </header>

  <div class="graph-controls">
    <button id="graphReset" class="graph-btn" title="Reset view">
      <i class="fa-solid fa-arrows-to-circle"></i>
    </button>
    <button id="graphZoomIn" class="graph-btn" title="Zoom in">
      <i class="fa-solid fa-plus"></i>
    </button>
    <button id="graphZoomOut" class="graph-btn" title="Zoom out">
      <i class="fa-solid fa-minus"></i>
    </button>
    <label class="graph-toggle">
      <input type="checkbox" id="graphLabels" checked>
      Labels
    </label>
  </div>

  <div class="graph-container" id="graphContainer">
    <svg id="wikiGraph" width="100%" height="100%">
      <defs>
        <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
          <polygon points="0 0, 6 2, 0 4" fill="#3a4a6b" />
        </marker>
      </defs>
    </svg>
    <div class="graph-tooltip" id="graphTooltip" hidden></div>
  </div>

  <!-- Node detail panel -->
  <div class="graph-detail" id="graphDetail" hidden>
    <button class="graph-detail-close" id="graphDetailClose">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <div id="graphDetailContent"></div>
  </div>
</div>
{{ end }}

{{ define "scripts" }}
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="{{ "js/graph.js" | absURL }}"></script>
<script>
  // Pass graph data endpoint to graph.js
  window.WIKI_GRAPH_URL = "{{ "/graph/data.json" | absURL }}";
  window.WIKI_BASE_URL  = "{{ "/" | absURL }}";
</script>
{{ end }}
